name: Deploy to Firebase Hosting

# Τρέχει αυτόματα κάθε φορά που ανεβαίνει (ή αλλάζει) κάτι στο branch "main"
on:
  push:
    branches:
      - main

jobs:
  # ΠΡΩΤΟ: έλεγχος υγείας. Αν αποτύχει, το deploy ΔΕΝ τρέχει καθόλου — τίποτα σπασμένο δεν φτάνει ζωντανό.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Λήψη των αρχείων του repository
        uses: actions/checkout@v4

      - name: Ρύθμιση Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Έλεγχος υγείας πριν το deploy
        run: node .github/scripts/validate.js

  # ΔΕΥΤΕΡΟ: μόνο αν το validate πέτυχε ("needs: validate")
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Λήψη των αρχείων του repository
        uses: actions/checkout@v4

      - name: Deploy στο Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: orion-milia
