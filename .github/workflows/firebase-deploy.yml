name: Deploy to Firebase Hosting

# Τρέχει αυτόματα κάθε φορά που ανεβαίνει (ή αλλάζει) κάτι στο branch "main"
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Λήψη των αρχείων του repository
        uses: actions/checkout@v4

      - name: Deploy στο Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: orion-milia
